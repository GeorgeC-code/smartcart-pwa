<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1024 1024'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0' stop-color='#E57373'/>
      <stop offset='1' stop-color='#FFB7C5'/>
    </linearGradient>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feGaussianBlur in='SourceAlpha' stdDeviation='20'/>
      <feOffset dx='0' dy='10' result='offsetblur'/>
      <feComponentTransfer><feFuncA type='linear' slope='0.3'/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in='SourceGraphic'/></feMerge>
    </filter>
  </defs>
  <rect width='1024' height='1024' rx='220' fill='url(#bg)'/>
  
  <g filter='url(#shadow)'>
    <!-- Cart Body -->
    <path d='M280 320h450l-45 320H345l-65-320z' stroke='white' stroke-width='48' stroke-linecap='round' stroke-linejoin='round' fill='none'/>
    <!-- Wheels -->
    <circle cx='390' cy='740' r='50' fill='white'/>
    <circle cx='660' cy='740' r='50' fill='white'/>
    <!-- Handle -->
    <path d='M280 320L240 240H160' stroke='white' stroke-width='48' stroke-linecap='round' fill='none' opacity='0.8'/>
    
    <!-- Success Checkmark -->
    <path d='M440 480l60 60 120-120' stroke='white' stroke-width='56' stroke-linecap='round' stroke-linejoin='round' fill='none'/>
  </g>
</svg>
