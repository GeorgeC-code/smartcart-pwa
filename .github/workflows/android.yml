name: Build Android Package

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Package PWA to Android APK/AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Android App
        id: build-pwa
        uses: pwa-builder/pwabuilder-google-play@v1
        with:
          # Your live PWA URL where the manifest & assets are hosted
          pwa-url: "https://ais-pre-c5z5oueuzt7qs567xwy62y-315456203743.europe-west1.run.app"
          # Unique Package ID for the Google Play Store
          android-package-id: "com.smartcart.pwa"
          # App name in application lists and launchers
          android-app-name: "SmartCart"
          # Optional custom configuration (PWABuilder default options are used if empty)
          # See: https://github.com/pwa-builder/pwabuilder-google-play for full specs

      - name: Upload APK & AAB Packages
        uses: actions/upload-artifact@v4
        with:
          name: android-release-packages
          path: ./*-release.apk
